<!DOCTYPE html>
<html>
<head>
    <title>Chat with Friends</title>
    <style>
        body { font-family: sans-serif; background: #ece5dd; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; width: fit-content; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-box { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="name" placeholder="Name" style="width: 20%;">
        <input type="text" id="msg" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "my-chat-61467.firebaseapp.com",
            databaseURL: "https://my-chat-61467-default-rtdb.firebaseio.com",
            projectId: "my-chat-61467",
            storageBucket: "my-chat-61467.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");

        // The core Send function
        const sendAction = () => {
            const nameInput = document.getElementById("name");
            const msgInput = document.getElementById("msg");
            
            if (msgInput.value.trim() !== "") {
                push(chatRef, {
                    name: nameInput.value || "Guest",
                    text: msgInput.value
                });
                msgInput.value = ""; // Clears the box after sending
            }
        };

        // Trigger on Button Click
        document.getElementById("sendBtn").onclick = sendAction;

        // NEW: Trigger on Enter Key
        const msgInput = document.getElementById("msg");
        msgInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault(); // Prevents cursor from making a new line
                sendAction(); // Calls the same send function
            }
        });

        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.className = "msg";
            div.innerHTML = `<b>${data.name}</b>: ${data.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Chat with Friends</title>
    <style>
        body { font-family: sans-serif; background: #ece5dd; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; width: fit-content; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-box { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; z-index: 10; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        /* GHOST PET */
        #ghost-pet { position: fixed; width: 85px; pointer-events: none; z-index: 99999; left: 0; top: 0; }
        #ghost-pet img { width: 100%; height: auto; animation: ghost-bob 2.5s infinite ease-in-out; }
        @keyframes ghost-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>

    <div id="ghost-pet"><img src="cghost.png" alt="Ghost Pet"></div>
    <div id="messages"></div>
    
    <div class="input-box">
        <input type="text" id="room" placeholder="Room (enter room id)" style="width: 30%; border: 2px solid #075e54;">
        <input type="text" id="name" placeholder="Name" style="width: 20%;">
        <input type="text" id="msg" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- REPLACE THIS BOX WITH YOUR FIREBASE CONFIG ---
      const firebaseConfig = {
  apiKey: "AIzaSyApQF3cgXaQsntMQpikgWVNMQ03IJ6jPQg",
  authDomain: "my-chat-61467.firebaseapp.com",
  databaseURL: "https://my-chat-61467-default-rtdb.firebaseio.com",
  projectId: "my-chat-61467",
  storageBucket: "my-chat-61467.firebasestorage.app",
  messagingSenderId: "526266288040",
  appId: "1:526266288040:web:79426f7266b41157f77f9d",
  measurementId: "G-2WR1XPPVXD"
};
        // --------------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRoom = "public";
        let chatRef = ref(db, "chats/" + currentRoom);

        // GHOST MOVEMENT
        const ghost = document.getElementById('ghost-pet');
        let mouseX = 0, mouseY = 0, ghostX = 0, ghostY = 0;
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        function animateGhost() {
            ghostX += (mouseX - ghostX) * 0.15; ghostY += (mouseY - ghostY) * 0.15;
            ghost.style.transform = `translate(${ghostX - 100}px, ${ghostY -20}px)`;
            requestAnimationFrame(animateGhost);
        }
        animateGhost();

        // ROOM LOGIC
        document.getElementById("room").addEventListener("change", (e) => {
            off(chatRef);
            currentRoom = e.target.value.trim() || "public";
            chatRef = ref(db, "chats/" + currentRoom);
            document.getElementById("messages").innerHTML = "";
            startListening();
        });

        // CHAT LOGIC
        const sendAction = () => {
            const m = document.getElementById("msg");
            if (m.value.trim() !== "") {
                push(chatRef, { name: document.getElementById("name").value || "Guest", text: m.value });
                m.value = "";
            }
        };
        document.getElementById("sendBtn").onclick = sendAction;
        document.getElementById("msg").onkeydown = (e) => { if(e.key === "Enter") sendAction(); };

        function startListening() {
            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const div = document.createElement("div");
                div.className = "msg";
                div.innerHTML = `<b>${data.name}</b>: ${data.text}`;
                document.getElementById("messages").appendChild(div);
                document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            });
        }
        startListening();
    </script>
</body>
</html>

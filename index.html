<!DOCTYPE html>
<html>
<head>
    <title>Chat with Friends</title>
    <style>
        body { font-family: sans-serif; background: #ece5dd; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; width: fit-content; max-width: 80%; }
        .input-box { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="name" placeholder="Your Name" style="width: 20%;">
        <input type="text" id="msg" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // *** PASTE YOUR FIREBASE CONFIG BELOW ***
        const firebaseConfig = {
            apiKey: "AIzaSyApQF3cgXaQsntMQpikgWVNMQ03IJ6jPQg",
  authDomain: "my-chat-61467.firebaseapp.com",
  projectId: "my-chat-61467",
  storageBucket: "my-chat-61467.firebasestorage.app",
  messagingSenderId: "526266288040",
  appId: "1:526266288040:web:79426f7266b41157f77f9d",
  measurementId: "G-2WR1XPPVXD"
}; 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chats");

        window.send = () => {
            const name = document.getElementById("name").value || "Guest";
            const text = document.getElementById("msg").value;
            if(text) { push(chatRef, { name, text }); document.getElementById("msg").value = ""; }
        };

        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.className = "msg";
            div.innerHTML = `<b>${data.name}</b>: ${data.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    </script>
</body>
</html>
